<section class="split review-workspace section-gap-xl">
  <div class="panel">
    <div class="row spread">
      <h2>__PENDING_REVIEWS_TITLE__</h2>
      <span class="tabs-note">__PENDING_REVIEWS_NOTE__</span>
    </div>
    <div class="list" id="review-list" data-testid="admin-review-list"></div>
  </div>
  <div class="panel">
    <div class="row spread">
      <h2>__DETAIL_TITLE__</h2>
      <span class="tabs-note">__DETAIL_NOTE__</span>
    </div>
    <div class="stack">
      <div id="review-detail-meta" data-testid="admin-review-detail-meta" class="list">
        <div class="empty">__DETAIL_EMPTY__</div>
      </div>
      <label>__REVIEW_COMMENT_LABEL__<textarea id="review-comment" data-testid="admin-review-comment" placeholder="__REVIEW_COMMENT_PLACEHOLDER__"></textarea></label>
      <div class="action-row">
        <button class="primary" id="approve-review-button" data-testid="admin-approve-review-button">__APPROVE_BUTTON__</button>
        <button id="reject-review-button" data-testid="admin-reject-review-button">__REJECT_BUTTON__</button>
      </div>
      <div id="diff-view" data-testid="admin-diff-view" class="mono empty">__DIFF_EMPTY__</div>
    </div>
  </div>
</section>

<section class="panel">
  <div class="row spread">
    <h2>__JOB_TITLE__</h2>
    <span class="tabs-note">__JOB_NOTE__</span>
  </div>
  <div class="list" id="job-list" data-testid="admin-job-list"></div>
</section>
