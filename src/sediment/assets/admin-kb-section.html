<section class="grid cols-2">
  <div class="panel">
    <div class="row spread">
      <h2>__INGEST_TITLE__</h2>
      <span class="tabs-note">__INGEST_NOTE__</span>
    </div>
    <div class="grid">
      <div class="dropzone" id="admin-ingest-dropzone" data-testid="admin-ingest-dropzone">
        <strong>__INGEST_DROPZONE_TITLE__</strong>
        <p class="subtle">__INGEST_DROPZONE_BODY__</p>
      </div>
      <div class="upload-grid">
        <label>__INGEST_FILE_LABEL__<input id="admin-ingest-file" data-testid="admin-ingest-file" type="file" multiple accept=".txt,.md,.docx,.pptx,.zip" /></label>
        <label>__INGEST_FOLDER_LABEL__<input id="admin-ingest-folder" data-testid="admin-ingest-folder" type="file" webkitdirectory directory multiple /></label>
      </div>
      <div class="detail-block">
        <strong>__INGEST_SELECTION_LABEL__</strong>
        <p id="admin-ingest-selection" data-testid="admin-ingest-selection">__INGEST_SELECTION_EMPTY__</p>
      </div>
      <button class="primary" id="admin-ingest-button" data-testid="admin-ingest-button">__INGEST_BUTTON__</button>
      <div id="admin-ingest-status" data-testid="admin-ingest-status" class="subtle" role="status" aria-live="polite">__INGEST_STATUS__</div>
      <div class="list scroll-list" id="submission-list" data-testid="admin-submission-list"></div>
    </div>
  </div>

  <div class="panel">
    <div class="row spread">
      <h2>__TIDY_TITLE__</h2>
      <span class="tabs-note">__TIDY_NOTE__</span>
    </div>
    <div class="grid">
      <label>__TIDY_REASON_LABEL__<input id="tidy-reason" data-testid="admin-tidy-reason" placeholder="__TIDY_REASON_PLACEHOLDER__" /></label>
      <button id="manual-tidy-button" data-testid="admin-manual-tidy-button">__TIDY_BUTTON__</button>
      <div class="detail-block">
        <strong>__TIDY_HINT_TITLE__</strong>
        <p>__TIDY_HINT_BODY__</p>
      </div>
    </div>
  </div>
</section>

<section class="panel">
  <div class="row spread">
    <h2>__EXPLORE_TITLE__</h2>
    <span class="tabs-note">__EXPLORE_NOTE__</span>
  </div>
  <div class="grid">
    <label>__EXPLORE_INPUT_LABEL__<textarea id="admin-explore-input" data-testid="admin-explore-input" placeholder="__EXPLORE_INPUT_PLACEHOLDER__"></textarea></label>
    <button class="primary" id="admin-explore-button" data-testid="admin-explore-button">__EXPLORE_BUTTON__</button>
    <div id="admin-explore-result" data-testid="admin-explore-result" class="markdown empty">__EXPLORE_RESULT_EMPTY__</div>
  </div>
</section>
