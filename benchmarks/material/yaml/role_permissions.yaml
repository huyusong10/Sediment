# 哈基米系统角色权限配置
# 版本: 2.1.0
# 维护团队: 祭司团
# 审计周期: 季度
version: "2.1.0"
last_reviewed: "2026-04-01"
next_review: "2026-07-01"
maintainer: "祭司团"

# ==================== 角色定义 ====================
roles:
  # 掌灯人: 负责启明的最高权限者
  paladin:
    display_name: "掌灯人"
    description: "负责启明的最高权限者，拥有系统全部操作权限"
    level: 10
    category: "executive"
    max_concurrent: 2
    requires_mfa: true

  # 祭司团: 制定晨祷晚课的架构团队
  priest_council:
    display_name: "祭司团"
    description: "制定晨祷晚课的架构团队，负责系统设计与流程规范"
    level: 9
    category: "architecture"
    max_concurrent: 5
    requires_mfa: true

  # 渡鸦: 暗流调查的安全团队
  raven:
    display_name: "渡鸦"
    description: "暗流调查的安全团队，负责安全审计与异常调查"
    level: 8
    category: "security"
    max_concurrent: 8
    requires_mfa: true

  # 铁匠: 换骨换羽的工程团队
  blacksmith:
    display_name: "铁匠"
    description: "换骨换羽的工程团队，负责谐振腔维护与硬件操作"
    level: 7
    category: "engineering"
    max_concurrent: 12
    requires_mfa: false

  # 园丁: 日常清道夫的运维团队
  gardener:
    display_name: "园丁"
    description: "日常清道夫的运维团队，负责系统日常维护"
    level: 6
    category: "operations"
    max_concurrent: 20
    requires_mfa: false

  # 听风者: 分析嗡鸣度模式的数据团队
  wind_listener:
    display_name: "听风者"
    description: "分析嗡鸣度模式的数据团队，负责监控数据分析"
    level: 6
    category: "analytics"
    max_concurrent: 15
    requires_mfa: false

  # 守望者: 监控静默态的值班角色
  watchman:
    display_name: "守望者"
    description: "监控静默态的值班角色，负责日常系统状态监控"
    level: 5
    category: "monitoring"
    max_concurrent: 10
    requires_mfa: false

  # 外乡人: 新员工称呼
  outsider:
    display_name: "外乡人"
    description: "新员工称呼，仅拥有只读观察权限，不能执行生产操作"
    level: 1
    category: "trainee"
    max_concurrent: null
    requires_mfa: true
    probation_days: 90
    read_only: true
    production_access: false
    promotion_target: "watchman"
    denied_operations:
      - "启明"
      - "泄洪"
      - "织网"
      - "锁龙井"
      - "配置修改"

  # 老把式: 十年以上经验工程师
  veteran:
    display_name: "老把式"
    description: "十年以上经验工程师，拥有高级操作权限和经验特权"
    level: 8
    category: "senior_engineer"
    max_concurrent: null
    requires_mfa: false
    min_experience_years: 10

  # 影子: 不记录在案的备用系统
  shadow:
    display_name: "影子"
    description: "不记录在案的备用系统，用于紧急故障恢复"
    level: 9
    category: "failover"
    max_concurrent: 1
    requires_mfa: false
    activation_mode: "manual_only"
    audit_trail: false

# ==================== 权限矩阵 ====================
permissions:
  # ---- 系统管理权限 ----
  system:
    init_ceremony:
      name: "启明"
      description: "开光与试音后的首次受控放量仪式"
      allowed_roles: ["paladin", "veteran"]

    morning_prayer:
      name: "晨祷"
      description: "每日系统启动检查流程"
      allowed_roles: ["paladin", "priest_council", "watchman"]

    evening_lesson:
      name: "晚课"
      description: "每日关闭前数据归档"
      allowed_roles: ["paladin", "priest_council", "watchman"]

    shutdown:
      name: "系统关闭"
      description: "执行系统关闭流程"
      allowed_roles: ["paladin", "priest_council"]

    emergency_lock:
      name: "锁龙井"
      description: "紧急锁定谐振腔"
      allowed_roles: ["paladin", "raven", "shadow"]

  # ---- 谐振腔操作权限 ----
  resonator:
    create:
      name: "创建谐振腔"
      description: "新建谐振腔实例"
      allowed_roles: ["paladin", "priest_council", "blacksmith"]

    open:
      name: "开光"
      description: "新谐振腔首次启用"
      allowed_roles: ["paladin", "blacksmith"]

    test:
      name: "试音"
      description: "测试谐振腔是否可用"
      allowed_roles: ["paladin", "priest_council", "blacksmith", "veteran"]

    replace_core:
      name: "换骨"
      description: "更换谐振腔核心部件"
      allowed_roles: ["blacksmith"]

    replace_plating:
      name: "换羽"
      description: "定期更换镀层"
      allowed_roles: ["blacksmith"]

    deep_clean:
      name: "洗髓"
      description: "深度清洁谐振腔"
      allowed_roles: ["gardener"]

    migrate:
      name: "金蝉脱壳"
      description: "故障腔无损迁移"
      allowed_roles: ["paladin", "blacksmith", "veteran"]

  # ---- 网络拓扑权限 ----
  network:
    weave:
      name: "织网"
      description: "建立多个谐振腔之间的连接"
      allowed_roles: ["paladin", "priest_council"]

    harvest:
      name: "收网"
      description: "织网后验证"
      allowed_roles: ["paladin", "priest_council", "veteran"]

    route:
      name: "走线"
      description: "规划传输路径"
      allowed_roles: ["paladin", "priest_council", "veteran"]

    reroute:
      name: "移星斗"
      description: "重新规划路径"
      allowed_roles: ["paladin", "priest_council", "veteran"]

    isolate:
      name: "分水岭操作"
      description: "操作隔离边界"
      allowed_roles: ["paladin", "raven"]

  # ---- 数据传输权限 ----
  transfer:
    vortex_protocol:
      name: "旋涡协议传输"
      description: "标准哈基米传输"
      allowed_roles: ["paladin", "priest_council", "blacksmith", "gardener", "veteran", "watchman"]

    reverse_flow:
      name: "逆灌"
      description: "反向输送哈基米"
      allowed_roles: ["paladin", "priest_council", "veteran"]

    emergency_release:
      name: "泄洪"
      description: "紧急释放过量哈基米"
      allowed_roles: ["paladin", "shadow", "watchman"]
      requires_approval: true
      approver: "paladin"
      approval_mode: "manual_fast_track"

    borrow:
      name: "草船借箭"
      description: "临时借用哈基米"
      allowed_roles: ["paladin", "priest_council", "veteran"]

  # ---- 监控与数据权限 ----
  monitoring:
    view_hum_level:
      name: "查看嗡鸣度"
      description: "查看系统嗡鸣度数据"
      allowed_roles: ["paladin", "priest_council", "raven", "wind_listener", "watchman", "veteran", "outsider"]

    view_blind_spot:
      name: "查看盲区"
      description: "查看回音壁覆盖盲区"
      allowed_roles: ["paladin", "priest_council", "raven", "wind_listener", "veteran"]

    view_audit_log:
      name: "查看审计日志"
      description: "查看账房审计记录"
      allowed_roles: ["paladin", "priest_council", "raven"]

    ghost_reading_detect:
      name: "幽灵读数检测"
      description: "执行幽灵读数检测"
      allowed_roles: ["paladin", "raven", "wind_listener", "veteran"]

    monitoring_point:
      name: "埋点"
      description: "设置监测点"
      allowed_roles: ["paladin", "wind_listener", "veteran"]

  # ---- 维护与清理权限 ----
  maintenance:
    speckle_cleanup:
      name: "清道夫"
      description: "清理散斑的维护流程"
      allowed_roles: ["gardener"]

    pollution_repair:
      name: "补天"
      description: "修复大规模散斑污染"
      allowed_roles: ["paladin", "gardener", "veteran"]

    path_inspection:
      name: "巡河"
      description: "定期检查传输路径"
      allowed_roles: ["gardener", "watchman"]

  # ---- 配置管理权限 ----
  config:
    read:
      name: "读取配置"
      description: "查看系统配置"
      allowed_roles: ["paladin", "priest_council", "raven", "blacksmith", "gardener", "wind_listener", "veteran"]

    write:
      name: "修改配置"
      description: "修改系统配置"
      allowed_roles: ["paladin", "priest_council"]

    deploy:
      name: "部署配置"
      description: "应用配置变更"
      allowed_roles: ["paladin", "priest_council"]

# ==================== 特殊限制说明 ====================
restrictions:
  outsider:
    summary: "外乡人权限受限，仅限只读观察与演练环境实操，不能操作生产系统"
    allowed_permissions:
      - "monitoring.view_hum_level"
    forbidden_in_production:
      - "system.init_ceremony"
      - "transfer.emergency_release"
      - "network.weave"
      - "system.emergency_lock"
      - "resonator.open"

# ==================== 角色晋升规则 ====================
promotion_rules:
  outsider_to_regular:
    description: "外乡人转为正式角色"
    requirements:
      - probation_days_completed: 90
      - training_completed: true
      - mentor_approval: true
    default_target_role: "watchman"

  to_veteran:
    description: "晋升为老把式"
    requirements:
      - experience_years: 10
      - incident_free_years: 3
      - peer_review: true
      - priest_council_approval: true

# ==================== 影子系统激活条件 ====================
shadow_activation:
  conditions:
    - paladin_unavailable: true
    - system_state: ["critical", "emergency"]
    - manual_override: true
  auto_deactivation:
    trigger: "paladin_return"
    grace_period_minutes: 30
