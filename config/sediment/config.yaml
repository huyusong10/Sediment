version: 1
locale: en

instance:
  name: sediment-example

paths:
  workspace_root: ../..
  knowledge_base: knowledge-base
  state_dir: .sediment_state

server:
  host: 0.0.0.0
  port: 8000
  sse_path: /sediment/
  run_jobs_in_process: false

auth:
  admin_token: ""
  session_secret: ""
  admin_session_cookie_name: sediment_admin_session
  admin_session_ttl_seconds: 43200
  secure_cookies: false

network:
  trust_proxy_headers: false
  trusted_proxy_cidrs: []

submissions:
  rate_limit_count: 1
  rate_limit_window_seconds: 60
  dedupe_window_seconds: 86400
  max_text_chars: 20000
  max_upload_bytes: 10485760

jobs:
  max_attempts: 3
  stale_after_seconds: 900

agent:
  backend: claude-code
  command: null
  model: null
  profile: null
  reasoning_effort: null
  sandbox: workspace-write
  approval_policy: null
  permission_mode: null
  variant: null
  agent_name: null
  dangerously_skip_permissions: false
  extra_args: []
  doctor_timeout_seconds: 20
  exec_timeout_seconds: 240

knowledge:
  name: Sediment Knowledge Base
  query_languages: ""
  index:
    max_entries: 120
    max_tokens: 8000
    root_file: index.root.md
    segment_glob: index*.md
